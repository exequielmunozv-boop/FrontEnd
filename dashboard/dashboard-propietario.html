<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNK Inmobiliaria - Dashboard Propietario</title>
    <link rel="stylesheet" href="../styles.css">
        <style>
        body {
            background-color: #ffffff;
            color: #000000;
        }
    
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
    
        .card {
            background-color: #ffffff;
            border: 1px solid #9e3c3c;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 10px 15px 5px rgba(0, 0, 0, 0.1);
        }
    
        .card h3 {
            margin-bottom: 15px;
        }
    
        .card a,
        .card button {
            display: inline-block;
            padding: 10px 20px;
            color: #ffffff;
            background-color: #0044ff;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
        }
    </style>

</head>
<body>
    <header>
        <h1>PNK Inmobiliaria</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="dashboard-propietario.html">Dashboard</a></li>
                <li><a href="../login.html">Cerrar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2 style="color: #000000;">Control de Propiedades</h2>
            <div class="dashboard">
                <div class="card">
                    <h3 style="color: #000000;">Registrar Propiedad</h3>
                    <a href="../register/register-propiedad.html">Ir a Registrar</a>
                </div>
                <div class="card">
                    <h3 style="color: #000000;">Mis Propiedades</h3>
                    <a href="#">Ver Mis Propiedades</a>
                </div>
                <div class="card">
                    <h3 style="color: #000000;">Editar Propiedad</h3>
                    <a href="#">Gestionar Propiedades</a>
                </div>
                <div class="card">
                    <h3 style="color: #000000;">Perfil</h3>
                    <a href="#">Editar Perfil</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 PNK Inmobiliaria. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
